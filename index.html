<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wsparcie Techniczne AZS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* (стили как в вашей последней версии) */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: linear-gradient(145deg, #eef2f6, #d9e0eb); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .chat-card { width: 100%; max-width: 1200px; height: 95vh; background: rgba(255,255,255,0.75); backdrop-filter: blur(20px); border-radius: 48px; box-shadow: 0 30px 60px -20px rgba(0,20,40,0.3), 0 0 0 1px rgba(255,255,255,0.7); display: flex; flex-direction: column; overflow: hidden; }
        .chat-header { padding: 24px 32px; background: rgba(255,255,255,0.4); border-bottom: 1px solid rgba(255,255,255,0.6); }
        .header-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
        .brand { display: flex; align-items: center; gap: 14px; }
        .brand i { font-size: 32px; color: #0a2647; background: white; padding: 10px; border-radius: 18px; box-shadow: 0 8px 20px -8px rgba(0,0,0,0.15); }
        .brand h1 { font-weight: 600; font-size: 1.8rem; color: #0a2647; }
        .status { background: #e6f0ff; padding: 8px 18px; border-radius: 40px; font-size: 0.9rem; color: #0a2647; display: flex; align-items: center; gap: 10px; }
        .status i { font-size: 10px; color: #27ae60; }
        .sub-info { font-size: 0.95rem; color: #2c3e50; margin-bottom: 18px; }
        .badge-wrapper { display: flex; flex-wrap: wrap; gap: 10px; }
        .badge { background: rgba(255,255,255,0.5); backdrop-filter: blur(4px); border: 1px solid rgba(255,255,255,0.8); padding: 6px 16px; border-radius: 40px; font-size: 0.8rem; color: #1a2634; }
        .chat-messages { flex: 1; overflow-y: auto; padding: 30px 32px; display: flex; flex-direction: column; gap: 16px; background: rgba(255,255,255,0.2); }
        .message { max-width: 70%; padding: 16px 22px; border-radius: 28px; font-size: 1rem; line-height: 1.6; word-wrap: break-word; box-shadow: 0 8px 18px -8px rgba(0,0,0,0.1); animation: slideUp 0.2s ease; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .message.user { align-self: flex-end; background: #0a2647; color: white; border-bottom-right-radius: 8px; }
        .message.bot { align-self: flex-start; background: white; color: #1a2634; border-bottom-left-radius: 8px; }
        .message.bot.typing { background: #eef2f6; color: #4b5563; font-style: italic; }
        .message.error { background: #fee2e2; color: #b91c1c; }
        .chat-footer { padding: 24px 32px; background: rgba(255,255,255,0.4); border-top: 1px solid rgba(255,255,255,0.6); }
        .input-group { display: flex; gap: 16px; margin-bottom: 24px; }
        #message-input { flex: 1; padding: 18px 26px; border: none; border-radius: 60px; font-family: 'Inter', sans-serif; font-size: 1rem; background: rgba(255,255,255,0.9); backdrop-filter: blur(4px); box-shadow: 0 8px 16px -12px rgba(0,0,0,0.1); outline: none; }
        #message-input:focus { box-shadow: 0 8px 20px -12px #0a2647, 0 0 0 2px #0a2647; }
        #message-input:disabled { opacity: 0.6; cursor: not-allowed; }
        #send-button { width: 64px; height: 64px; border: none; border-radius: 50%; background: #0a2647; color: white; font-size: 1.4rem; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 12px 24px -12px #0a2647; transition: all 0.2s; flex-shrink: 0; }
        #send-button:hover:not(:disabled) { background: #1e3a5f; transform: scale(1.05); }
        #send-button:disabled { opacity: 0.4; cursor: not-allowed; }
        .examples { display: flex; flex-wrap: wrap; gap: 12px; }
        .example-btn { background: rgba(255,255,255,0.6); backdrop-filter: blur(4px); border: 1px solid rgba(255,255,255,0.8); border-radius: 50px; padding: 10px 22px; font-size: 0.9rem; color: #1a2634; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; transition: background 0.2s; }
        .example-btn:hover { background: white; transform: translateY(-2px); }
        .footer-note { margin-top: 20px; font-size: 0.8rem; color: #4b5563; text-align: center; border-top: 1px dashed rgba(255,255,255,0.8); padding-top: 16px; }
        @media (max-width: 768px) { /* адаптация */ }
    </style>
</head>
<body>
    <div class="chat-card">
        <div class="chat-header">
            <div class="header-row">
                <div class="brand">
                    <i class="fas fa-shield-halved"></i>
                    <h1>Wsparcie</h1>
                </div>
                <div class="status" id="status-badge">
                    <i class="fas fa-circle"></i>
                    <span>Inicjalizacja...</span>
                </div>
            </div>
            <div class="sub-info">
                <i class="fas fa-microchip"></i> Systemy bezpieczeństwa
            </div>
            <div class="badge-wrapper" id="system-tags"></div>
        </div>

        <div class="chat-messages" id="chat-messages"></div>

        <div class="chat-footer">
            <div class="input-group">
                <input type="text" id="message-input" placeholder="Wpisz pytanie..." autocomplete="off">
                <button id="send-button"><i class="fas fa-paper-plane"></i></button>
            </div>
            <div class="examples" id="example-buttons"></div>
            <div class="footer-note">
                <i class="far fa-lightbulb"></i> Odpowiadamy prostymi krokami.
            </div>
        </div>
    </div>

    <script>
        (function() {
            'use strict';

            const API_URL = 'https://assistics.up.railway.app/chat';
            const sessionId = 'sesja_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);

            const SUPPORTED_SYSTEMS = [
                'Bosch', 'Hikvision', 'Paradox', 'Satel', 'Rosslare',
                '3xLogic', 'Provision', 'Siemens', 'Babyware'
            ];

            const EXAMPLES = [
                'Kamera nie wyświetla obrazu',
                'Jak zmienić kod w Rosslare?',
                'Alarm ciągle się włącza',
                'Nie mogę uzbroić systemu Paradox',
                'Brak nagrań z kamery Hikvision',
                'Czytnik kart nie reaguje',
                'Zmiana kodu użytkownika w Satel'
            ];

            const messagesDiv = document.getElementById('chat-messages');
            const input = document.getElementById('message-input');
            const sendButton = document.getElementById('send-button');
            const statusBadge = document.getElementById('status-badge');
            const systemTags = document.getElementById('system-tags');
            const examplesContainer = document.getElementById('example-buttons');

            let isSending = false;

            function updateStatus(text, type = 'normal') {
                const color = type === 'error' ? '#e74c3c' : '#27ae60';
                statusBadge.innerHTML = `<i class="fas fa-circle" style="color: ${color};"></i> <span>${text}</span>`;
            }

            function addMessage(text, sender, isError = false) {
                const msgDiv = document.createElement('div');
                msgDiv.className = `message ${sender}${isError ? ' error' : ''}`;
                msgDiv.textContent = text;
                messagesDiv.appendChild(msgDiv);
                messagesDiv.scrollTop = messagesDiv.scrollHeight;
                return msgDiv;
            }

            function showTypingIndicator() {
                const typingDiv = document.createElement('div');
                typingDiv.id = 'typing-indicator';
                typingDiv.className = 'message bot typing';
                typingDiv.innerHTML = '<i class="fas fa-ellipsis-h"></i> Asystent pisze...';
                messagesDiv.appendChild(typingDiv);
                messagesDiv.scrollTop = messagesDiv.scrollHeight;
            }

            function removeTypingIndicator() {
                const typing = document.getElementById('typing-indicator');
                if (typing) typing.remove();
            }

            async function sendMessage(text) {
                if (isSending || !text.trim()) return;

                isSending = true;
                input.disabled = true;
                sendButton.disabled = true;

                addMessage(text, 'user');
                input.value = '';
                showTypingIndicator();

                try {
                    const response = await fetch(API_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ message: text, session_id: sessionId })
                    });

                    removeTypingIndicator();

                    if (!response.ok) {
                        if (response.status === 429) {
                            addMessage('Osiągnięto limit zapytań. Odczekaj chwilę.', 'bot', true);
                        } else {
                            throw new Error(`HTTP ${response.status}`);
                        }
                    } else {
                        const data = await response.json();
                        addMessage(data.reply || 'Brak odpowiedzi.', 'bot');
                    }
                } catch (error) {
                    console.error('Błąd połączenia:', error);
                    removeTypingIndicator();
                    addMessage('❌ Błąd połączenia. Spróbuj ponownie.', 'bot', true);
                } finally {
                    isSending = false;
                    input.disabled = false;
                    sendButton.disabled = false;
                    input.focus();
                }
            }

            function initUI() {
                SUPPORTED_SYSTEMS.forEach(sys => {
                    const tag = document.createElement('span');
                    tag.className = 'badge';
                    tag.textContent = sys;
                    systemTags.appendChild(tag);
                });

                addMessage('Cześć! 👋 Opisz problem, a podam proste kroki.', 'bot');

                EXAMPLES.forEach(ex => {
                    const btn = document.createElement('button');
                    btn.className = 'example-btn';
                    btn.innerHTML = `<i class="fas fa-arrow-right"></i> ${ex}`;
                    btn.addEventListener('click', () => sendMessage(ex));
                    examplesContainer.appendChild(btn);
                });

                // --- ОСНОВНЫЕ ОБРАБОТЧИКИ ОТПРАВКИ ---
                sendButton.addEventListener('click', () => {
                    sendMessage(input.value);
                });

                input.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') {
                        e.preventDefault();
                        sendMessage(input.value);
                    }
                });

                // Активируем интерфейс
                input.disabled = false;
                sendButton.disabled = false;
                input.focus();
                updateStatus('Gotowy');
            }

            window.addEventListener('DOMContentLoaded', initUI);
        })();
    </script>
</body>
</html>
