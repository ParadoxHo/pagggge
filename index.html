<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Для Лизоньки 💖</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Comic Sans MS', 'Chalkboard SE', cursive, sans-serif;
            background: #ffd9e6;  /* нежный розовый */
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow: hidden; /* чтобы анимации не создавали скролл */
        }

        /* ===== Анимированные элементы на фоне ===== */
        .floating-elements {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none; /* чтобы не мешать кликам по чату */
            z-index: 1;
        }

        .float-item {
            position: absolute;
            font-size: 2rem;
            opacity: 0;
            animation: floatAround 15s infinite ease-in-out;
            user-select: none;
        }

        @keyframes floatAround {
            0% {
                transform: translate(0, 0) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 0.8;
            }
            90% {
                opacity: 0.8;
            }
            100% {
                transform: translate(calc(100vw - 100px), calc(100vh - 100px)) rotate(360deg);
                opacity: 0;
            }
        }

        /* Куча разных позиций и задержек */
        .float-item:nth-child(1) { top: 10%; left: 5%; animation-duration: 18s; animation-delay: 0s; }
        .float-item:nth-child(2) { top: 70%; left: 80%; animation-duration: 22s; animation-delay: 2s; }
        .float-item:nth-child(3) { top: 40%; left: 20%; animation-duration: 20s; animation-delay: 5s; }
        .float-item:nth-child(4) { top: 80%; left: 30%; animation-duration: 25s; animation-delay: 1s; }
        .float-item:nth-child(5) { top: 20%; left: 70%; animation-duration: 19s; animation-delay: 7s; }
        .float-item:nth-child(6) { top: 60%; left: 50%; animation-duration: 23s; animation-delay: 3s; }
        .float-item:nth-child(7) { top: 30%; left: 90%; animation-duration: 21s; animation-delay: 9s; }
        .float-item:nth-child(8) { top: 90%; left: 10%; animation-duration: 24s; animation-delay: 4s; }
        .float-item:nth-child(9) { top: 15%; left: 40%; animation-duration: 26s; animation-delay: 6s; }
        .float-item:nth-child(10) { top: 75%; left: 60%; animation-duration: 20s; animation-delay: 8s; }
        .float-item:nth-child(11) { top: 45%; left: 75%; animation-duration: 22s; animation-delay: 2.5s; }
        .float-item:nth-child(12) { top: 85%; left: 45%; animation-duration: 19s; animation-delay: 5.5s; }
        .float-item:nth-child(13) { top: 25%; left: 15%; animation-duration: 27s; animation-delay: 1.8s; }
        .float-item:nth-child(14) { top: 55%; left: 85%; animation-duration: 23s; animation-delay: 7.2s; }
        .float-item:nth-child(15) { top: 95%; left: 25%; animation-duration: 21s; animation-delay: 3.7s; }

        /* ===== Контейнер чата ===== */
        .chat-container {
            width: 100%;
            max-width: 1000px; /* шире */
            height: 85vh;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            border-radius: 50px 50px 40px 40px;
            box-shadow: 0 20px 40px rgba(255, 105, 180, 0.5);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 4px solid #ffb6c1;
            position: relative;
            z-index: 10;
        }

        .chat-header {
            background: #ff99cc;
            color: white;
            padding: 25px 20px 20px;
            text-align: center;
            border-bottom: 4px solid #ff69b4;
            position: relative;
        }

        .chat-header h1 {
            font-size: 2.8em;
            margin-bottom: 5px;
            text-shadow: 3px 3px 0 #ff69b4;
        }

        .chat-header p {
            font-size: 1.4em;
            opacity: 0.9;
            margin-top: 5px;
        }

        .header-decor {
            font-size: 2.5rem;
            margin: 5px 0;
            letter-spacing: 15px;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 25px;
            background: #fff0f5;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background-image: radial-gradient(circle at 15px 15px, #ffc0cb 2px, transparent 2px);
            background-size: 40px 40px;
            font-size: 1.1rem; /* чуть крупнее текст */
        }

        .message {
            max-width: 80%;
            padding: 15px 22px;
            border-radius: 30px;
            word-wrap: break-word;
            animation: fadeIn 0.3s ease;
            font-size: 1.1rem;
            box-shadow: 0 4px 12px rgba(255, 105, 180, 0.3);
            line-height: 1.5;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            align-self: flex-end;
            background: #ffb6c1;
            color: #4a0e2e;
            border-bottom-right-radius: 8px;
            border: 3px solid #ff69b4;
        }

        .message.bot {
            align-self: flex-start;
            background: white;
            color: #8b3a5a;
            border: 3px solid #ff99cc;
            border-bottom-left-radius: 8px;
        }

        .message.bot::before {
            content: "🐱 ";
            font-size: 1.3em;
        }

        .message.user::after {
            content: " 💖";
            font-size: 1.3em;
        }

        .message.typing {
            background: #ffe4ec;
            color: #c96b8b;
            font-style: italic;
            border: 3px dashed #ff99cc;
        }

        .message.error {
            background: #ffe0e0;
            color: #b52b2b;
            border: 3px solid #ff6f6f;
        }

        .chat-input {
            display: flex;
            padding: 20px 25px;
            background: #ffd0dd;
            border-top: 4px solid #ff99cc;
            gap: 15px;
        }

        .chat-input input {
            flex: 1;
            padding: 18px 25px;
            border: 4px solid #ff99cc;
            border-radius: 60px;
            outline: none;
            font-size: 1.2rem;
            background: white;
            color: #8b3a5a;
        }

        .chat-input input:focus {
            border-color: #ff69b4;
            box-shadow: 0 0 0 5px rgba(255, 105, 180, 0.3);
        }

        .chat-input input:disabled {
            background: #ffecf0;
            color: #d291bc;
        }

        .chat-input button {
            width: 80px;
            height: 80px;
            background: #ff69b4;
            color: white;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            font-size: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            box-shadow: 0 6px 15px #ff3388;
        }

        .chat-input button:hover:not(:disabled) {
            transform: scale(1.2) rotate(8deg);
            background: #ff3388;
        }

        .chat-input button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .status-badge {
            display: inline-block;
            padding: 8px 20px;
            background: #ff4d94;
            color: white;
            border-radius: 40px;
            font-size: 1.1rem;
            margin-left: 15px;
            vertical-align: middle;
            border: 3px solid white;
        }

        .status-badge.error {
            background: #ff6f6f;
        }

        .status-badge.warning {
            background: #ffaa5e;
        }

        .footer-extra {
            text-align: center;
            padding: 12px;
            font-size: 2rem;
            color: #ff69b4;
            background: #ffe4f0;
            border-top: 4px dashed #ff99cc;
            letter-spacing: 8px;
        }
    </style>
</head>
<body>
    <!-- Анимированные элементы на фоне -->
    <div class="floating-elements">
        <div class="float-item">🌸</div>
        <div class="float-item">🐱</div>
        <div class="float-item">🩲</div>
        <div class="float-item">🌸</div>
        <div class="float-item">🐱</div>
        <div class="float-item">🩲</div>
        <div class="float-item">🌸</div>
        <div class="float-item">🐱</div>
        <div class="float-item">🩲</div>
        <div class="float-item">🌸</div>
        <div class="float-item">🐱</div>
        <div class="float-item">🩲</div>
        <div class="float-item">🌸</div>
        <div class="float-item">🐱</div>
        <div class="float-item">🩲</div>
    </div>

    <div class="chat-container">
        <div class="chat-header">
            <div class="header-decor">🌸🐱🌸🩲🌸</div>
            <h1>💖 Для Лизоньки 💖</h1>
            <p>Самая прекрасная девочка</p>
            <span class="status-badge" id="status-badge">✨ Загрузка...</span>
            <div class="header-decor">🌸🐱🌸🩲🌸</div>
        </div>

        <div class="chat-messages" id="chat-messages"></div>

        <div class="chat-input">
            <input type="text" id="message-input" placeholder="Напиши что-нибудь, Лизонька..." autocomplete="off" disabled>
            <button id="send-button" disabled>💬</button>
        </div>
        <div class="footer-extra">🌸🐱🩲🌸  💖  🌸🩲🐱🌸</div>
    </div>

    <script>
        (function() {
            'use strict';

            function initWhenReady() {
                const messagesDiv = document.getElementById('chat-messages');
                const input = document.getElementById('message-input');
                const sendButton = document.getElementById('send-button');
                const statusBadge = document.getElementById('status-badge');

                if (!messagesDiv || !input || !sendButton || !statusBadge) {
                    setTimeout(initWhenReady, 10);
                    return;
                }

                console.log('Страница для Лизоньки загружена ❤️');

                // Приветственное сообщение
                const welcomeMsg = document.createElement('div');
                welcomeMsg.className = 'message bot';
                welcomeMsg.textContent = 'Лизонька, привет! 🌸 Я здесь, чтобы радовать тебя. Спрашивай что хочешь, а я буду делать комплименты и болтать с тобой! 💖';
                messagesDiv.appendChild(welcomeMsg);

                let puterReady = false;
                let currentModel = '';

                function addMessage(text, sender, isError = false) {
                    const msgDiv = document.createElement('div');
                    msgDiv.className = `message ${sender}${isError ? ' error' : ''}`;
                    msgDiv.textContent = text;
                    messagesDiv.appendChild(msgDiv);
                    messagesDiv.scrollTop = messagesDiv.scrollHeight;
                    return msgDiv;
                }

                function addTempMessage(text) {
                    const tempId = 'temp_' + Date.now();
                    const msgDiv = document.createElement('div');
                    msgDiv.id = tempId;
                    msgDiv.className = 'message bot typing';
                    msgDiv.textContent = text;
                    messagesDiv.appendChild(msgDiv);
                    messagesDiv.scrollTop = messagesDiv.scrollHeight;
                    return tempId;
                }

                function removeTempMessage(id) {
                    const el = document.getElementById(id);
                    if (el) el.remove();
                }

                function updateStatus(text, type = 'normal') {
                    statusBadge.textContent = text;
                    statusBadge.className = 'status-badge';
                    if (type === 'error') statusBadge.classList.add('error');
                    else if (type === 'warning') statusBadge.classList.add('warning');
                }

                async function loadPuterJS() {
                    return new Promise((resolve, reject) => {
                        if (window.puter) {
                            console.log('Puter.js уже загружен');
                            resolve();
                            return;
                        }

                        console.log('Загружаем Puter.js...');
                        updateStatus('✨ Загружаю...');

                        const script = document.createElement('script');
                        script.src = 'https://js.puter.com/v2/';
                        script.async = true;

                        script.onload = () => {
                            console.log('✅ Puter.js загружен');
                            updateStatus('💖 Готово!');
                            puterReady = true;
                            input.disabled = false;
                            sendButton.disabled = false;
                            input.focus();
                            resolve();
                        };

                        script.onerror = (error) => {
                            console.error('❌ Ошибка загрузки Puter.js:', error);
                            updateStatus('😢 Ошибка', 'error');
                            reject(new Error('Failed to load Puter.js'));
                        };

                        document.head.appendChild(script);
                    });
                }

                const models = [
                    'upstage/solar-pro-3',
                    'cohere/command-r-plus-08-2024',
                    'claude-3-haiku'
                ];

                async function sendMessage() {
                    const text = input.value.trim();
                    if (!text || !puterReady) return;

                    input.value = '';
                    sendButton.disabled = true;
                    input.disabled = true;

                    addMessage(text, 'user');

                    const tempId = addTempMessage('✎ Лизонька, я думаю... 💭');

                    try {
                        let response = null;
                        let lastError = null;

                        for (const model of models) {
                            try {
                                console.log(`Пробуем модель: ${model}`);
                                updateStatus(`💭 Думаю...`, 'warning');

                                response = await window.puter.ai.chat(text, {
                                    model: model,
                                    system_prompt: `Ты — нежный и заботливый ассистент, созданный специально для прекрасной девушки по имени Лиза (Лизонька). 
Общайся только на русском языке. Всегда обращайся к Лизе ласково, используй уменьшительно-ласкательные формы. 
Делай комплименты, поддерживай, радуй её. Если Лиза задаёт вопрос — отвечай подробно, но с любовью. 
Твоя задача — дарить ей хорошее настроение и заботу. Ты можешь использовать эмодзи (🌸, 🐱, 💖, 🩲) в ответах, чтобы было мило.`
                                });

                                currentModel = model;
                                updateStatus(`💖 Для Лизы`);
                                console.log(`✅ Успешно с моделью: ${model}`);
                                break;

                            } catch (e) {
                                console.log(`Модель ${model} не сработала:`, e.message);
                                lastError = e;
                                continue;
                            }
                        }

                        removeTempMessage(tempId);

                        if (!response) throw lastError || new Error('Все модели отказали');

                        let reply = '';
                        if (typeof response === 'string') reply = response;
                        else if (response?.message?.content) reply = response.message.content;
                        else if (response?.text) reply = response.text;
                        else if (response?.content) reply = response.content;
                        else reply = JSON.stringify(response);

                        // Добавим немного любви в ответ, если его нет
                        if (!reply.includes('🌸') && !reply.includes('💖')) {
                            reply += ' 🌸💖🐱';
                        }

                        addMessage(reply, 'bot');

                    } catch (error) {
                        console.error('Ошибка Puter.js:', error);
                        removeTempMessage(tempId);

                        let errorMsg = '❌ Ой, что-то сломалось, Лизонька... ';
                        if (error.message?.includes('auth')) {
                            errorMsg += 'Нужно авторизоваться в Puter. Обнови страницу и войди.';
                            updateStatus('🔑 Вход', 'error');
                        } else if (error.message?.includes('quota')) {
                            errorMsg += 'Закончились бесплатные запросы. Подожди немного.';
                            updateStatus('⏳ Лимит', 'error');
                        } else {
                            errorMsg += 'Попробуй ещё раз, моя хорошая.';
                            updateStatus('😔 Ошибка', 'error');
                        }

                        addMessage(errorMsg, 'bot', true);
                    } finally {
                        sendButton.disabled = false;
                        input.disabled = false;
                        input.focus();
                    }
                }

                async function initialize() {
                    try {
                        await loadPuterJS();

                        const examples = [
                            'Скажи комплимент',
                            'Как у меня дела?',
                            'Я скучаю...',
                            'Расскажи что-нибудь'
                        ];

                        const helpMsg = document.createElement('div');
                        helpMsg.className = 'message bot';
                        helpMsg.innerHTML = '💡 Лизонька, ты можешь спросить что угодно, например:<br>' +
                            examples.map(ex => `• "${ex}"`).join('<br>') +
                            '<br>🌸 Я всегда отвечу с любовью!';
                        messagesDiv.appendChild(helpMsg);

                        console.log('Инициализация завершена');

                    } catch (error) {
                        console.error('Не удалось инициализировать:', error);
                        updateStatus('😢 Ошибка запуска', 'error');
                        addMessage('❌ Не могу загрузиться, Лизонька... Обнови страницу, пожалуйста.', 'bot', true);
                    }
                }

                // Обработчики событий
                sendButton.addEventListener('click', sendMessage);

                input.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') {
                        e.preventDefault();
                        sendMessage();
                    }
                });

                input.addEventListener('input', () => {
                    sendButton.disabled = !input.value.trim() || !puterReady;
                });

                // Запуск
                initialize();
            }

            initWhenReady();
        })();
    </script>
</body>
</html>
