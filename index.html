<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Для Лизоньки 💖</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Comic Sans MS', 'Chalkboard SE', cursive, sans-serif;
            background: #ffd9e6;  /* нежный розовый */
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* Розовые трусики и котики на фоне */
        body::before {
            content: "🐱🌸🩲🌸🐱🌸🩲🌸🐱";
            position: absolute;
            top: 10px;
            left: 0;
            width: 100%;
            font-size: 24px;
            color: #ff69b4;
            opacity: 0.3;
            white-space: nowrap;
            animation: slide 30s linear infinite;
            pointer-events: none;
        }

        body::after {
            content: "🌸🩲🐱🌸🩲🐱🌸🩲🐱🌸";
            position: absolute;
            bottom: 10px;
            left: 0;
            width: 100%;
            font-size: 24px;
            color: #ff99cc;
            opacity: 0.3;
            white-space: nowrap;
            animation: slide 25s linear reverse infinite;
            pointer-events: none;
        }

        @keyframes slide {
            from { transform: translateX(-100%); }
            to { transform: translateX(100%); }
        }

        .chat-container {
            width: 100%;
            max-width: 700px;
            height: 85vh;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(5px);
            border-radius: 40px 40px 30px 30px;
            box-shadow: 0 20px 40px rgba(255, 105, 180, 0.4);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 3px solid #ffb6c1;
            position: relative;
            z-index: 10;
        }

        .chat-header {
            background: #ff99cc;
            color: white;
            padding: 20px;
            text-align: center;
            border-bottom: 3px solid #ff69b4;
            position: relative;
        }

        .chat-header h1 {
            font-size: 2em;
            margin-bottom: 5px;
            text-shadow: 2px 2px 0 #ff69b4;
        }

        .chat-header p {
            font-size: 1.2em;
            opacity: 0.9;
        }

        .header-decor {
            font-size: 2rem;
            margin-top: 5px;
            letter-spacing: 10px;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #fff0f5;
            display: flex;
            flex-direction: column;
            gap: 10px;
            background-image: radial-gradient(circle at 10px 10px, #ffc0cb 1px, transparent 1px);
            background-size: 30px 30px;
        }

        .message {
            max-width: 80%;
            padding: 12px 18px;
            border-radius: 25px;
            word-wrap: break-word;
            animation: fadeIn 0.3s ease;
            font-size: 1rem;
            box-shadow: 0 3px 10px rgba(255, 105, 180, 0.2);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            align-self: flex-end;
            background: #ffb6c1;
            color: #4a0e2e;
            border-bottom-right-radius: 5px;
            border: 2px solid #ff69b4;
        }

        .message.bot {
            align-self: flex-start;
            background: white;
            color: #8b3a5a;
            border: 2px solid #ff99cc;
            border-bottom-left-radius: 5px;
        }

        .message.bot::before {
            content: "🐱 ";
            font-size: 1.2em;
        }

        .message.user::after {
            content: " 💖";
            font-size: 1.2em;
        }

        .message.typing {
            background: #ffe4ec;
            color: #c96b8b;
            font-style: italic;
            border: 2px dashed #ff99cc;
        }

        .message.error {
            background: #ffe0e0;
            color: #b52b2b;
            border: 2px solid #ff6f6f;
        }

        .chat-input {
            display: flex;
            padding: 20px;
            background: #ffd0dd;
            border-top: 3px solid #ff99cc;
            gap: 10px;
        }

        .chat-input input {
            flex: 1;
            padding: 15px 20px;
            border: 3px solid #ff99cc;
            border-radius: 50px;
            outline: none;
            font-size: 1rem;
            background: white;
            color: #8b3a5a;
        }

        .chat-input input:focus {
            border-color: #ff69b4;
            box-shadow: 0 0 0 3px rgba(255, 105, 180, 0.3);
        }

        .chat-input input:disabled {
            background: #ffecf0;
            color: #d291bc;
        }

        .chat-input button {
            width: 60px;
            height: 60px;
            background: #ff69b4;
            color: white;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            font-size: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            box-shadow: 0 4px 10px #ff3388;
        }

        .chat-input button:hover:not(:disabled) {
            transform: scale(1.15) rotate(5deg);
            background: #ff3388;
        }

        .chat-input button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .status-badge {
            display: inline-block;
            padding: 5px 15px;
            background: #ff4d94;
            color: white;
            border-radius: 30px;
            font-size: 0.9rem;
            margin-left: 10px;
            vertical-align: middle;
            border: 2px solid white;
        }

        .status-badge.error {
            background: #ff6f6f;
        }

        .status-badge.warning {
            background: #ffaa5e;
        }

        /* Цветочки и трусики в сообщениях */
        .message.bot em {
            font-style: normal;
            animation: sparkle 1.5s infinite;
        }

        @keyframes sparkle {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        /* Розовый трусик внизу */
        .footer-extra {
            text-align: center;
            padding: 5px;
            font-size: 1.5rem;
            color: #ff69b4;
            background: #ffe4f0;
            border-top: 2px dashed #ff99cc;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <div class="header-decor">🌸🐱🌸🩲🌸</div>
            <h1>💖 Для Лизоньки 💖</h1>
            <p>Твой личный ассистент, который любит тебя и делает комплименты</p>
            <span class="status-badge" id="status-badge">Загрузка...</span>
            <div class="header-decor">🌸🐱🌸🩲🌸</div>
        </div>

        <div class="chat-messages" id="chat-messages"></div>

        <div class="chat-input">
            <input type="text" id="message-input" placeholder="Напиши что-нибудь, Лизонька..." autocomplete="off" disabled>
            <button id="send-button" disabled>💬</button>
        </div>
        <div class="footer-extra">🌸🐱🩲🌸  Для самой лучшей девочки  🌸🩲🐱🌸</div>
    </div>

    <script>
        (function() {
            'use strict';

            function initWhenReady() {
                const messagesDiv = document.getElementById('chat-messages');
                const input = document.getElementById('message-input');
                const sendButton = document.getElementById('send-button');
                const statusBadge = document.getElementById('status-badge');

                if (!messagesDiv || !input || !sendButton || !statusBadge) {
                    setTimeout(initWhenReady, 10);
                    return;
                }

                console.log('Страница для Лизоньки загружена ❤️');

                // Приветственное сообщение
                const welcomeMsg = document.createElement('div');
                welcomeMsg.className = 'message bot';
                welcomeMsg.textContent = 'Лизонька, привет! 🌸 Я твой личный ассистент, созданный специально для тебя. Спрашивай что хочешь, а я буду делать комплименты и помогать! 💖';
                messagesDiv.appendChild(welcomeMsg);

                let puterReady = false;
                let currentModel = '';

                function addMessage(text, sender, isError = false) {
                    const msgDiv = document.createElement('div');
                    msgDiv.className = `message ${sender}${isError ? ' error' : ''}`;
                    msgDiv.textContent = text;
                    messagesDiv.appendChild(msgDiv);
                    messagesDiv.scrollTop = messagesDiv.scrollHeight;
                    return msgDiv;
                }

                function addTempMessage(text) {
                    const tempId = 'temp_' + Date.now();
                    const msgDiv = document.createElement('div');
                    msgDiv.id = tempId;
                    msgDiv.className = 'message bot typing';
                    msgDiv.textContent = text;
                    messagesDiv.appendChild(msgDiv);
                    messagesDiv.scrollTop = messagesDiv.scrollHeight;
                    return tempId;
                }

                function removeTempMessage(id) {
                    const el = document.getElementById(id);
                    if (el) el.remove();
                }

                function updateStatus(text, type = 'normal') {
                    statusBadge.textContent = text;
                    statusBadge.className = 'status-badge';
                    if (type === 'error') statusBadge.classList.add('error');
                    else if (type === 'warning') statusBadge.classList.add('warning');
                }

                async function loadPuterJS() {
                    return new Promise((resolve, reject) => {
                        if (window.puter) {
                            console.log('Puter.js уже загружен');
                            resolve();
                            return;
                        }

                        console.log('Загружаем Puter.js...');
                        updateStatus('Загружаю Puter.js...');

                        const script = document.createElement('script');
                        script.src = 'https://js.puter.com/v2/';
                        script.async = true;

                        script.onload = () => {
                            console.log('✅ Puter.js загружен');
                            updateStatus('Готово! 💖');
                            puterReady = true;
                            input.disabled = false;
                            sendButton.disabled = false;
                            input.focus();
                            resolve();
                        };

                        script.onerror = (error) => {
                            console.error('❌ Ошибка загрузки Puter.js:', error);
                            updateStatus('Ошибка :(', 'error');
                            reject(new Error('Failed to load Puter.js'));
                        };

                        document.head.appendChild(script);
                    });
                }

                const models = [
                    'upstage/solar-pro-3',
                    'cohere/command-r-plus-08-2024',
                    'claude-3-haiku'
                ];

                async function sendMessage() {
                    const text = input.value.trim();
                    if (!text || !puterReady) return;

                    input.value = '';
                    sendButton.disabled = true;
                    input.disabled = true;

                    addMessage(text, 'user');

                    const tempId = addTempMessage('✎ Лизонька, я думаю... 💭');

                    try {
                        let response = null;
                        let lastError = null;

                        for (const model of models) {
                            try {
                                console.log(`Пробуем модель: ${model}`);
                                updateStatus(`Думаю...`, 'warning');

                                response = await window.puter.ai.chat(text, {
                                    model: model,
                                    system_prompt: `Ты — нежный и заботливый ассистент, созданный специально для прекрасной девушки по имени Лиза (Лизонька). 
Общайся только на русском языке. Всегда обращайся к Лизе ласково, используй уменьшительно-ласкательные формы. 
Делай комплименты, поддерживай, радуй её. Если Лиза задаёт вопрос — отвечай подробно, но с любовью. 
Твоя задача — дарить ей хорошее настроение и заботу. Ты можешь использовать эмодзи (🌸, 🐱, 💖, 🩲) в ответах, чтобы было мило.`
                                });

                                currentModel = model;
                                updateStatus(`Для Лизоньки 💕`);
                                console.log(`✅ Успешно с моделью: ${model}`);
                                break;

                            } catch (e) {
                                console.log(`Модель ${model} не сработала:`, e.message);
                                lastError = e;
                                continue;
                            }
                        }

                        removeTempMessage(tempId);

                        if (!response) throw lastError || new Error('Все модели отказали');

                        let reply = '';
                        if (typeof response === 'string') reply = response;
                        else if (response?.message?.content) reply = response.message.content;
                        else if (response?.text) reply = response.text;
                        else if (response?.content) reply = response.content;
                        else reply = JSON.stringify(response);

                        // Добавим немного любви в ответ, если его нет
                        if (!reply.includes('🌸') && !reply.includes('💖')) {
                            reply += ' 🌸💖🐱';
                        }

                        addMessage(reply, 'bot');

                    } catch (error) {
                        console.error('Ошибка Puter.js:', error);
                        removeTempMessage(tempId);

                        let errorMsg = '❌ Ой, что-то сломалось, Лизонька... ';
                        if (error.message?.includes('auth')) {
                            errorMsg += 'Нужно авторизоваться в Puter. Обнови страницу и войди.';
                            updateStatus('Нужен вход', 'error');
                        } else if (error.message?.includes('quota')) {
                            errorMsg += 'Закончились бесплатные запросы. Подожди немного.';
                            updateStatus('Лимит', 'error');
                        } else {
                            errorMsg += 'Попробуй ещё раз, моя хорошая.';
                            updateStatus('Ошибка', 'error');
                        }

                        addMessage(errorMsg, 'bot', true);
                    } finally {
                        sendButton.disabled = false;
                        input.disabled = false;
                        input.focus();
                    }
                }

                async function initialize() {
                    try {
                        await loadPuterJS();

                        const examples = [
                            'Скажи комплимент',
                            'Как у меня дела?',
                            'Я скучаю...'
                        ];

                        const helpMsg = document.createElement('div');
                        helpMsg.className = 'message bot';
                        helpMsg.innerHTML = '💡 Лизонька, ты можешь спросить что угодно, например:<br>' +
                            examples.map(ex => `• "${ex}"`).join('<br>') +
                            '<br>🌸 Я всегда отвечу с любовью!';
                        messagesDiv.appendChild(helpMsg);

                        console.log('Инициализация завершена');

                    } catch (error) {
                        console.error('Не удалось инициализировать:', error);
                        updateStatus('Ошибка запуска', 'error');
                        addMessage('❌ Не могу загрузиться, Лизонька... Обнови страницу, пожалуйста.', 'bot', true);
                    }
                }

                // Обработчики событий
                sendButton.addEventListener('click', sendMessage);

                input.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') {
                        e.preventDefault();
                        sendMessage();
                    }
                });

                input.addEventListener('input', () => {
                    sendButton.disabled = !input.value.trim() || !puterReady;
                });

                // Запуск
                initialize();
            }

            initWhenReady();
        })();
    </script>
</body>
</html>
