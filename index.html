<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wsparcie Techniczne AZS</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f0f2f5;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }

        .chat-container {
            width: 100%;
            max-width: 900px;
            height: 90vh;
            background: white;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.12);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-header {
            background: #0b2b4f;
            color: white;
            padding: 20px 24px;
            border-bottom: 2px solid #1e4a76;
        }

        .chat-header h1 {
            font-size: 1.8rem;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .chat-header p {
            font-size: 1rem;
            opacity: 0.9;
        }

        .badge-container {
            display: flex;
            gap: 8px;
            margin-top: 8px;
            flex-wrap: wrap;
        }

        .badge {
            background: #1e4a76;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 500;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            background: #f9fafc;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message {
            max-width: 75%;
            padding: 12px 16px;
            border-radius: 18px;
            word-wrap: break-word;
            font-size: 0.95rem;
            line-height: 1.5;
            animation: fadeIn 0.2s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            align-self: flex-end;
            background: #0b2b4f;
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.bot {
            align-self: flex-start;
            background: white;
            color: #1e293b;
            border: 1px solid #e2e8f0;
            border-bottom-left-radius: 4px;
        }

        .message.bot.typing {
            background: #e9eef2;
            color: #4a5b6e;
            font-style: italic;
            border: 1px dashed #94a3b8;
        }

        .message.error {
            background: #fee2e2;
            color: #b91c1c;
            border: 1px solid #fecaca;
        }

        .chat-input-area {
            padding: 20px 24px;
            background: white;
            border-top: 1px solid #e2e8f0;
        }

        .input-wrapper {
            display: flex;
            gap: 12px;
            margin-bottom: 12px;
        }

        #message-input {
            flex: 1;
            padding: 14px 18px;
            border: 1px solid #cbd5e1;
            border-radius: 40px;
            outline: none;
            font-size: 1rem;
            transition: border-color 0.2s;
        }

        #message-input:focus {
            border-color: #0b2b4f;
            box-shadow: 0 0 0 3px rgba(11, 43, 79, 0.1);
        }

        #message-input:disabled {
            background: #f1f5f9;
            cursor: not-allowed;
        }

        #send-button {
            width: 52px;
            height: 52px;
            background: #0b2b4f;
            color: white;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.4rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s, transform 0.1s;
        }

        #send-button:hover:not(:disabled) {
            background: #1e4a76;
            transform: scale(1.05);
        }

        #send-button:disabled {
            background: #94a3b8;
            cursor: not-allowed;
        }

        .examples {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .example-btn {
            background: #f1f5f9;
            border: 1px solid #cbd5e1;
            border-radius: 30px;
            padding: 8px 16px;
            font-size: 0.9rem;
            color: #1e293b;
            cursor: pointer;
            transition: background 0.2s;
        }

        .example-btn:hover {
            background: #e2e8f0;
        }

        .footer-note {
            text-align: center;
            font-size: 0.8rem;
            color: #64748b;
            margin-top: 12px;
        }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap" rel="stylesheet">
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <h1>🔒 Wsparcie Techniczne AZS</h1>
            <p>Systemy bezpieczeństwa • Monitoring • Alarmy • Kontrola dostępu</p>
            <div class="badge-container">
                <span class="badge">Bosch</span>
                <span class="badge">Hikvision</span>
                <span class="badge">Paradox</span>
                <span class="badge">Satel</span>
                <span class="badge">Rosslare</span>
                <span class="badge">3xLogic</span>
                <span class="badge">Provision</span>
            </div>
        </div>

        <div class="chat-messages" id="chat-messages"></div>

        <div class="chat-input-area">
            <div class="input-wrapper">
                <input type="text" id="message-input" placeholder="Opisz problem..." autocomplete="off" disabled>
                <button id="send-button" disabled>➤</button>
            </div>
            <div class="examples" id="example-buttons"></div>
            <div class="footer-note">
                Wpisz pytanie lub wybierz przykład. Odpowiadamy tylko po polsku.
            </div>
        </div>
    </div>

    <script>
        (function() {
            'use strict';

            // Konfiguracja – adres backendu (Railway)
            const API_URL = 'https://assistics.up.railway.app/chat';

            // Generuj unikalny identyfikator sesji (przechowywany w pamięci na czas trwania strony)
            const sessionId = 'sesja_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);

            // Elementy DOM
            const messagesDiv = document.getElementById('chat-messages');
            const input = document.getElementById('message-input');
            const sendButton = document.getElementById('send-button');
            const examplesContainer = document.getElementById('example-buttons');

            // Przykładowe pytania (dostosowane do rzeczywistych problemów)
            const examples = [
                'Kamera nie wyświetla obrazu',
                'Jak zmienić kod w Rosslare?',
                'Alarm ciągle się włącza',
                'Nie mogę uzbroić systemu Paradox',
                'Brak nagrań z kamery Hikvision',
                'Czytnik kart nie reaguje',
                'Zmiana kodu użytkownika w Satel'
            ];

            let isSending = false; // blokada przed wielokrotnym wysłaniem

            // Funkcja dodawania wiadomości do okna
            function addMessage(text, sender, isError = false) {
                const msgDiv = document.createElement('div');
                msgDiv.className = `message ${sender}${isError ? ' error' : ''}`;
                msgDiv.textContent = text;
                messagesDiv.appendChild(msgDiv);
                messagesDiv.scrollTop = messagesDiv.scrollHeight;
                return msgDiv;
            }

            // Funkcja pokazująca tymczasową wiadomość "pisze..."
            function showTypingIndicator() {
                const typingDiv = document.createElement('div');
                typingDiv.id = 'typing-indicator';
                typingDiv.className = 'message bot typing';
                typingDiv.textContent = '⏳ Asystent pisze...';
                messagesDiv.appendChild(typingDiv);
                messagesDiv.scrollTop = messagesDiv.scrollHeight;
            }

            function removeTypingIndicator() {
                const typing = document.getElementById('typing-indicator');
                if (typing) typing.remove();
            }

            // Funkcja wysyłająca zapytanie do backendu
            async function sendMessage(text) {
                if (isSending) return;
                if (!text.trim()) return;

                isSending = true;
                input.disabled = true;
                sendButton.disabled = true;

                addMessage(text, 'user');
                input.value = '';

                showTypingIndicator();

                try {
                    const response = await fetch(API_URL, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({ 
                            message: text,
                            session_id: sessionId 
                        }),
                    });

                    removeTypingIndicator();

                    if (!response.ok) {
                        throw new Error(`HTTP ${response.status}`);
                    }

                    const data = await response.json();
                    if (data.reply) {
                        addMessage(data.reply, 'bot');
                    } else {
                        addMessage('Przepraszam, nie otrzymałem poprawnej odpowiedzi.', 'bot', true);
                    }
                } catch (error) {
                    console.error('Błąd połączenia:', error);
                    removeTypingIndicator();
                    addMessage('❌ Błąd połączenia. Sprawdź sieć i spróbuj ponownie.', 'bot', true);
                } finally {
                    isSending = false;
                    input.disabled = false;
                    sendButton.disabled = false;
                    input.focus();
                }
            }

            // Obsługa przycisku wysyłania
            sendButton.addEventListener('click', () => {
                sendMessage(input.value);
            });

            // Obsługa klawisza Enter
            input.addEventListener('keypress', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage(input.value);
                }
            });

            // Inicjalizacja – przywitanie i przyciski przykładowych pytań
            function init() {
                addMessage('Cześć! 👋 Jestem asystentem technicznym. Opisz swój problem związany z monitoringiem, alarmem lub kontrolą dostępu. Postaram się pomóc.', 'bot');

                examples.forEach(ex => {
                    const btn = document.createElement('button');
                    btn.className = 'example-btn';
                    btn.textContent = ex;
                    btn.addEventListener('click', () => {
                        input.value = ex;
                        sendMessage(ex);
                    });
                    examplesContainer.appendChild(btn);
                });

                input.disabled = false;
                sendButton.disabled = false;
                input.focus();
            }

            init();
        })();
    </script>
</body>
</html>
